name: CI

on:
  push:
    branches: [main, develop, e2e]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Type check
        run: vp run type-check

      - name: Lint
        run: vp run lint

      - name: Unit tests
        run: vp test

      - name: Build
        run: vp run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build application
        run: vp run build

      - name: Start Grist
        run: docker compose -f e2e/docker-compose.yml up -d

      - name: Setup Playwright
        uses: dtinth/setup-playwright-test-docker@main

      - name: Run E2E tests
        run: vp run test:e2e
        env:
          CI: true

      - name: Percy
        if: ${{ always() && env.PERCY_TOKEN != '' }}
        run: vp dlx @percy/cli upload e2e-results/
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: |
            test-results/
            e2e-results/
          retention-days: 7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Publish test results to object storage
        continue-on-error: true
        run: |
          # Install Rclone
          curl https://rclone.org/install.sh | sudo bash

          # Upload playwright report (keyed by run ID — ephemeral)
          rclone copy playwright-report/ publish:$PUBLISH_BUCKET/$PUBLISH_KEY/playwright-report/ --progress

          # Upload storyboards (keyed by branch — stable URL)
          rclone copy test-storyboards/ publish:$PUBLISH_BUCKET/$STORYBOARD_KEY/storyboards/ --progress

          # Print report URL for CI logs
          REPORT_URL="$REPORT_URL_PREFIX/$PUBLISH_KEY/playwright-report/index.html"
          STORYBOARD_URL="$REPORT_URL_PREFIX/$STORYBOARD_KEY/storyboards"
          echo "📊 Test report published: $REPORT_URL"
          echo "🎬 Storyboards published: $STORYBOARD_URL"

          # Generate preview URL and add to step summary
          echo "## 📊 Test Results Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** ${{ github.run_id }}-${{ github.run_attempt }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **[View Test Report]($REPORT_URL)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎬 **Storyboards** (stable, branch-keyed):" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in test-storyboards/*/storyboard.ndjson; do
            slug=$(basename "$(dirname "$f")")
            ndjson_url="$STORYBOARD_URL/$slug/storyboard.ndjson"
            viewer_url="https://visual-storyboard.vercel.app/?url=$ndjson_url"
            echo "- [\`$slug\`]($viewer_url)" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Fallback: Download artifacts below if S3 link is unavailable" >> $GITHUB_STEP_SUMMARY
        env:
          PUBLISH_BUCKET: ghartifacts
          PUBLISH_KEY: ${{ github.repository }}/${{ github.run_id }}-${{ github.run_attempt }}
          STORYBOARD_KEY: ${{ github.repository }}/branches/${{ github.ref_name }}
          REPORT_URL_PREFIX: https://ghartifacts.t3.storage.dev
          RCLONE_CONFIG_PUBLISH_TYPE: s3
          RCLONE_CONFIG_PUBLISH_PROVIDER: Other
          RCLONE_CONFIG_PUBLISH_REGION: auto
          RCLONE_CONFIG_PUBLISH_ACL: public-read
          RCLONE_CONFIG_PUBLISH_ENDPOINT: https://t3.storage.dev
          RCLONE_CONFIG_PUBLISH_ACCESS_KEY_ID: tid_cweGkGmDMMfHSUdYAEyGsRExuXHBTmAWVCWfa_XyogdcaaTlBo
          RCLONE_CONFIG_PUBLISH_SECRET_ACCESS_KEY: ${{ secrets.RCLONE_CONFIG_PUBLISH_SECRET_ACCESS_KEY }}
        if: always() && hashFiles('playwright-report/**/*') != ''
